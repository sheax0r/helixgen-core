[project]
name = "helixgen"
version = "0.1.6"
description = "Generate Line 6 Helix .hsp / .hlx preset files from JSON tone specs."
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Mike Shea"},
]
dependencies = [
    "click>=8.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
]
mcp = [
    "mcp>=1.0,<2.0",
]

[project.scripts]
helixgen = "helixgen.cli:cli"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src", "."]
include = ["helixgen*", "mcp_server*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
