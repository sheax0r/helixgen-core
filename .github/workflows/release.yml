# When .claude-plugin/plugin.json's version changes on main, tag the
# release and fast-forward the stable branch. Stable is what the
# marketplace's plugin entry resolves to on /plugin install, so merging
# to main does NOT immediately ship a release — that only happens when
# this workflow runs after a deliberate version bump.
#
# Convention: tag name is "{plugin-name}--v{version}" so the existing
# `claude plugin tag` CLI keeps working. Idempotent — re-runs without a
# version change are a no-op.

name: Release on plugin version bump

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need tags + history for the fast-forward push

      - name: Read plugin name + version
        id: meta
        run: |
          name=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['name'])")
          version=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          tag="${name}--v${version}"
          {
            echo "name=$name"
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::plugin=$name version=$version tag=$tag"

      - name: Verify marketplace entry version matches plugin.json
        run: |
          mp_ver=$(python3 -c '
          import json, sys
          d = json.load(open(".claude-plugin/marketplace.json"))
          name = "${{ steps.meta.outputs.name }}"
          for p in d.get("plugins", []):
              if p.get("name") == name:
                  print(p.get("version", ""))
                  sys.exit(0)
          print("")
          ')
          if [ -z "$mp_ver" ]; then
            echo "::error::marketplace.json has no plugin entry named ${{ steps.meta.outputs.name }}"
            exit 1
          fi
          if [ "$mp_ver" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::version mismatch: plugin.json=${{ steps.meta.outputs.version }} marketplace.json=$mp_ver. Bump both together."
            exit 1
          fi

      - name: Check if release tag already exists
        id: tag_check
        run: |
          if git rev-parse --verify --quiet "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::tag ${{ steps.meta.outputs.tag }} already exists — no-op"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag release and fast-forward stable
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" -m "Release ${{ steps.meta.outputs.version }}"
          git push origin "${{ steps.meta.outputs.tag }}"
          # Fast-forward stable to the just-tagged commit. If stable diverged
          # for any reason, fail rather than force-push — diagnose manually.
          git push origin "HEAD:refs/heads/stable"
          echo "::notice::tagged ${{ steps.meta.outputs.tag }} and updated stable"
